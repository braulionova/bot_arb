[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 1000000
evm_version = "shanghai"

# Arbitrum One
[rpc_endpoints]
arbitrum = "https://arbitrum.drpc.org"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
